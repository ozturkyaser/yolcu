name: Deploy DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on Droplet via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DO_PROJECT_PATH }}"
            git checkout main
            git pull --ff-only origin main
            chmod +x scripts/docker-full-rebuild.sh 2>/dev/null || true
            ./scripts/docker-full-rebuild.sh prod
