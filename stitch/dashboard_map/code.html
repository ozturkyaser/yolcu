<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yol Arkadaşım - Panel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#ffb77d",
                    "on-primary-fixed": "#001a40",
                    "inverse-on-surface": "#f0f1f1",
                    "tertiary-container": "#983c00",
                    "on-primary-container": "#bbd0ff",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-container": "#ffc2a7",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#2f1500",
                    "on-secondary-fixed-variant": "#6e3900",
                    "tertiary": "#722b00",
                    "tertiary-fixed-dim": "#ffb694",
                    "surface-container-high": "#e8e8e8",
                    "surface-tint": "#115cb9",
                    "on-background": "#1a1c1c",
                    "background": "#f9f9f9",

                    "surface": "#f9f9f9",

                    "outline": "#727784",
                    "outline-variant": "#c2c6d4",
                    "on-surface-variant": "#424752",

                    "on-primary": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "inverse-surface": "#2f3131",
                    "on-tertiary-fixed": "#351000",
                    "inverse-primary": "#acc7ff",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "primary-container": "#0056b3",
                    "on-error": "#ffffff",
                    "on-error-container": "#93000a",
                    "secondary": "#904d00",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#d7e2ff",
                    "primary": "#003f87",
                    "on-primary-fixed-variant": "#004491",
                    "secondary-fixed": "#ffdcc3",
                    "primary-fixed-dim": "#acc7ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f9] dark:bg-[#2f3131] shadow-[0_8px_32px_rgba(26,28,28,0.08)] flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#003f87] dark:text-[#ffffff] hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">search</span>
</button>
<h1 class="font-['Inter'] font-bold text-3xl tracking-tight text-[#003f87] dark:text-[#ffffff]">Yol Arkadaşım</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex gap-8 px-4">
<span class="text-[#003f87] dark:text-white font-medium cursor-pointer">Harita</span>
<span class="text-[#dadada] dark:text-[#dadada] font-medium cursor-pointer hover:opacity-80">Topluluk</span>
<span class="text-[#dadada] dark:text-[#dadada] font-medium cursor-pointer hover:opacity-80">Profil</span>
</div>
<button class="text-[#003f87] dark:text-[#ffffff] hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">emergency_home</span>
</button>
</div>
</header>
<!-- Main Map Canvas -->
<main class="relative h-screen w-full pt-[72px] pb-[88px]">
<!-- Map Background Mock -->
<div class="absolute inset-0 z-0 bg-surface-container">
<img alt="Map background" class="w-full h-full object-cover grayscale-[20%] contrast-[1.1]" data-alt="detailed topographic map showing a blue route line stretching across central and eastern europe with mountains and major highways visible" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSCMWVMXn9TfzId-s-f3wNMet6FRg3F0-TVUOBzU7fLbp7cNQx_Iq1o75Fd-uqtSRDT-q3G1tgVginttLwiM_EPMoz5b304GtlnDthvh_Xgp7s69nR1hYQhpXCYiDxtkynsP6TQSE_frFVFA9t3pWiBkCzyoOnSIQ8yY2Nvi_gZf7EtOqHQhAc0nNZo_PtQNZjyleSbkPZE41RsAjN60ptodXJp7XdVEOXjXRLU-wYvkDGQMUbdOh6VRIS67wscJbtCRBTGEgW9Dsc"/>
<!-- Horizon Indicator (Custom Component) -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-tertiary via-secondary to-tertiary opacity-80"></div>
</div>
<!-- Next Border Overlay Card -->
<div class="absolute top-6 left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-md">
<div class="bg-surface-container-lowest/80 backdrop-blur-3xl rounded-full p-4 flex items-center justify-between shadow-[0_8px_32px_rgba(26,28,28,0.08)]">
<div class="flex items-center gap-3">
<div class="bg-primary text-on-primary p-2 rounded-full">
<span class="material-symbols-outlined text-[20px]">flag</span>
</div>
<div>
<p class="text-on-surface-variant font-label text-[0.7rem] uppercase tracking-wider">Sıradaki Sınır</p>
<p class="font-headline font-bold text-lg text-on-surface leading-none">Horgos, Serbia/Hungary</p>
</div>
</div>
<div class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-xs font-bold whitespace-nowrap">30 DK BEKLEME</span>
</div>
</div>
</div>
<!-- Map UI Elements (Markers/FABS) -->
<div class="absolute inset-0 pointer-events-none p-6">
<!-- Map Markers -->
<!-- Safe Parking Marker -->
<div class="absolute top-1/2 left-1/3 pointer-events-auto transform -translate-x-1/2 -translate-y-1/2">
<div class="flex flex-col items-center group">
<div class="bg-surface-container-lowest text-primary p-2 rounded-xl shadow-lg border-2 border-primary/20 scale-100 hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_parking</span>
</div>
<span class="mt-2 bg-primary text-on-primary px-2 py-0.5 rounded text-[0.65rem] font-bold opacity-0 group-hover:opacity-100 transition-opacity">GÜVENLİ BÖLGE</span>
</div>
</div>
<!-- Group Member 1 -->
<div class="absolute top-1/3 right-1/4 pointer-events-auto">
<div class="relative w-10 h-10 ring-4 ring-primary-container rounded-full overflow-hidden shadow-xl border-2 border-white">
<img alt="Alex P." class="w-full h-full object-cover" data-alt="portrait of a male driver wearing sunglasses inside a vehicle cabin, soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLaZ63aL8nuPOnF1_g2Ek_nemdsdHaBeaIbiMQ-V5aLdxvyPZ7qVkMnxW4CXjE6np-B_0D4I3sOxsPaO60rDyKAhnzHxOLl-CJjN628bKJCYPLX74nxL5uq7sx95mOQUUqkfTBSmly34yYyq90kK9JTE1eG1LgCS_d9EKY4iumv2047-ghevX6VvTlrkit1npXomgy7TjbWNOFmg9nDo4y8LUe0ztchgAplr1DLLSjEHnQTAACM0Hh2X4VJfPbw3cTbbqYv0Nqw93r"/>
<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
</div>
</div>
<!-- Right-side Interaction Cluster -->
<div class="absolute bottom-10 right-6 flex flex-col items-end gap-4 pointer-events-auto">
<!-- Search POI -->
<button class="w-14 h-14 bg-surface-container-lowest text-on-surface-variant rounded-full flex items-center justify-center shadow-lg hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl">search</span>
</button>
<!-- Report Event -->
<button class="w-14 h-14 bg-surface-container-lowest text-on-surface-variant rounded-full flex items-center justify-center shadow-lg hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl">report</span>
</button>
<!-- SOS / Help Button -->
<button class="h-16 px-8 bg-gradient-to-br from-error to-[#93000a] text-white rounded-full flex items-center gap-3 shadow-[0_12px_48px_rgba(186,26,26,0.3)] active:scale-90 transition-all">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">sos</span>
<span class="font-headline font-black tracking-widest text-lg">YARDIM</span>
</button>
</div>
<!-- Distance Stats Card (Heads-up Display) -->
<div class="absolute bottom-10 left-6 pointer-events-auto">
<div class="bg-inverse-surface text-inverse-on-surface p-6 rounded-3xl w-64 shadow-2xl space-y-4">
<div class="flex justify-between items-end">
<div>
<p class="text-surface-dim font-label text-[0.7rem] uppercase tracking-[0.1em]">Hedef</p>
<p class="text-2xl font-bold font-headline leading-tight">Istanbul</p>
</div>
<div class="text-right">
<p class="text-surface-dim font-label text-[0.7rem] uppercase tracking-[0.1em]">Kalan</p>
<p class="text-2xl font-bold text-primary-fixed-dim leading-tight">1,842<span class="text-xs ml-1">KM</span></p>
</div>
</div>
<div class="h-1 w-full bg-surface-variant/20 rounded-full overflow-hidden">
<div class="h-full w-[45%] bg-primary-fixed-dim"></div>
</div>
<div class="flex justify-between items-center text-xs font-medium text-surface-dim">
<span>TAHMİNİ VARIŞ</span>
<span class="text-inverse-on-surface">YARIN, 14:20</span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#ffffff]/80 dark:bg-[#2f3131]/80 backdrop-blur-3xl rounded-t-3xl z-50 shadow-[0_-8px_32px_rgba(26,28,28,0.08)]">
<!-- Map (Active) -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#003f87] to-[#0056b3] text-white rounded-xl px-6 py-2 tap-highlight-transparent transition-all duration-300" href="#">
<span class="material-symbols-outlined">explore</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-[0.05em]">Harita</span>
</a>
<!-- Community -->
<a class="flex flex-col items-center justify-center text-[#2f3131] dark:text-[#dadada] opacity-60 hover:bg-[#f3f3f3] dark:hover:bg-white/10 tap-highlight-transparent transition-all duration-300" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-[0.05em]">Topluluk</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#2f3131] dark:text-[#dadada] opacity-60 hover:bg-[#f3f3f3] dark:hover:bg-white/10 tap-highlight-transparent transition-all duration-300" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] font-medium text-[0.75rem] uppercase tracking-[0.05em]">Profil</span>
</a>
</nav>
</body></html>
