# React SPA: index.html + Service Worker dürfen nicht wochenlang „immutable“ gecacht werden,
# sonst wirkt die Live-Seite nach Deploy wie eine alte Version (lokal: Vite ohne SW → immer frisch).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

    # Service Worker: fester Pfad, Inhalt ändert sich pro Release
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Vite-Bundles unter /assets/ sind gehasht → lang cachen ist sicher
    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
